version: "3.9"

# NOTE: Harbor itself should be installed separately via its official offline installer.
# This compose file covers only the orchestrator + worker.

services:
  orchestrator:
    build: .
    image: celegans-orchestrator:dev
    command: uvicorn orchestrator.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/runtime/orchestrator.db
      - QUEUE_DIR=/app/runtime/queue
      - WORK_DIR=/app/runtime/work
      - DATA_ROOT=/app/data
      - SMTP_DRY_RUN=true
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data

  worker:
    image: celegans-orchestrator:dev
    command: python -m orchestrator.worker
    depends_on:
      - orchestrator
    environment:
      - DATABASE_URL=sqlite:////app/runtime/orchestrator.db
      - QUEUE_DIR=/app/runtime/queue
      - WORK_DIR=/app/runtime/work
      - DATA_ROOT=/app/data
      - SMTP_DRY_RUN=true
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
